<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Hero</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1020;
        --fg: #eef2ff;
        --muted: rgba(238, 242, 255, 0.5);
        --card: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica,
          Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 600px at 50% 0%, #1b2a6b 0%, var(--bg) 55%);
        color: var(--fg);
      }

      .hero {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .hero__content {
        width: min(720px, 100%);
        text-align: center;
        padding: 48px 28px;
        border-radius: 18px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 2vw, 1.125rem);
        color: var(--muted);
        line-height: 1.6;
      }

      .btn-row {
        margin-top: 18px;
        display: flex;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid transparent;
        color: #0b1020;
        text-decoration: none;
        font-weight: 700;
        cursor: pointer;
        transition: transform 120ms ease, filter 120ms ease, box-shadow 120ms ease;
        user-select: none;
      }

      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn:focus-visible {
        outline: 3px solid rgba(99, 102, 241, 0.7);
        outline-offset: 3px;
      }

      .btn--primary {
        background: #a5b4fc;
        box-shadow: 0 12px 30px rgba(165, 180, 252, 0.22);
      }

      .btn--secondary {
        background: #6ee7b7;
        box-shadow: 0 12px 30px rgba(110, 231, 183, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <section class="hero__content" aria-label="Hero">
        <h1>Hero Section</h1>
        <p>A simple placeholder text centered on the screen.</p>
        <div class="btn-row" role="group" aria-label="Hero actions">
          <a class="btn btn--primary" href="#">Primary action</a>
          <a class="btn btn--secondary" href="#">Secondary action</a>
        </div>
      </section>
    </main>
  </body>
</html>
