<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Hero</title>
    <style>
      :root {
        --bg: #0b1020;
        --fg: #eef2ff;
        --muted: rgba(238, 242, 255, 0.62);
        --card: rgba(255, 255, 255, 0.08);
        --border: rgba(255, 255, 255, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        color: var(--fg);
        background: radial-gradient(1200px 700px at 50% 0%, #1b2a6b 0%, var(--bg) 58%);
      }

      .hero {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .hero__content {
        width: min(760px, 100%);
        text-align: center;
        padding: 52px 28px;
        border-radius: 18px;
        background: var(--card);
        border: 1px solid var(--border);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(2rem, 4vw, 3rem);
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        font-size: clamp(1rem, 2vw, 1.125rem);
        line-height: 1.65;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="hero">
      <section class="hero__content" aria-label="Hero">
        <h1>Hero Section</h1>
        <p>Simple placeholder text centered on the screen.</p>
      </section>
    </main>
  </body>
</html>
